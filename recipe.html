<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>냉장고를 부탁해</title>

  <link rel="stylesheet" href="css/recipe.css">

</head>

<body>

  <div class="recipe-container">

    <div class="home-box">

        <button id="home-btn" onclick="location.href='main.html'">
          🏠 홈
        </button>

      </div>

    <!-- 상단 -->
    <section class="search-section">

      <p class="sub-title">
        원하는 음식이나 재료로 메뉴를 찾아보세요
      </p>

      <h1>
        냉장고를 부탁해
      </h1>

      <!-- 검색 모드 -->
      <div class="search-mode">

        <button class="mode-btn active" data-mode="menu">
          메뉴명 검색
        </button>

        <button class="mode-btn" data-mode="ingredient">
          재료 검색
        </button>

      </div>

      <!-- 검색창 -->
      <div class="search-box">

        <input type="text" id="search-input" placeholder="메뉴명을 입력하세요 (예: 김치볶음밥)">

        <button id="search-btn">
          검색
        </button>

      </div>

      <!-- 태그 -->
      <div id="tag-container">

        <button class="tag-btn" data-tag="간단">
          #간단
        </button>

        <button class="tag-btn" data-tag="가성비">
          #가성비
        </button>

        <button class="tag-btn" data-tag="매운맛">
          #매운맛
        </button>

        <button class="tag-btn" data-tag="한식">
          #한식
        </button>

        <button class="tag-btn" data-tag="추가">
          #추가
        </button>

      </div>

    </section>

    <!-- 결과 -->
    <section id="food-list">

    </section>

  </div>

  <script src="js/foodDB.js"></script>
  <script src="js/recipe.js"></script>

</body>

</html>
