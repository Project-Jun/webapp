<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐 먹지?</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">

    <!-- 상단 -->
    <header class="hero">

      <p class="sub-title">혼밥러를 위한 메뉴 추천 플랫폼</p>

      <h1>오늘 뭐 먹지?</h1>

      <div class="today-card">

        <span class="today-label">TODAY MENU</span>

        <h2 id="today-menu">
          김치찌개 🍲
        </h2>

        <button onclick="recommendMenu()">
          다시 추천
        </button>

      </div>

    </header>

    <!-- 메뉴 카드 -->
    <section class="menu-grid">

      <!-- 음식 월드컵 -->
      <div class="menu-card" onclick="goWorldcup()">

        <div class="card-icon">
          🏆
        </div>

        <h2>음식 월드컵</h2>

        <p>
          최고의 음식 메뉴를 직접 선택해보세요
        </p>

        <span class="move-text">
          시작하기 →
        </span>

      </div>

      <!-- 냉장고를 부탁해 -->
      <div class="menu-card" onclick="goFridge()">

        <div class="card-icon">
          🧊
        </div>

        <h2>냉장고를 부탁해</h2>

        <p>
          냉장고 속 재료로 가능한 요리를 추천해드립니다
        </p>

        <span class="move-text">
          이동하기 →
        </span>

      </div>

    </section>

  </div>

  <script src="js/main.js"></script>

</body>
</html>
